apiVersion: v1
kind: ServiceAccount
metadata:
  name: bad-fixed-single-controller
  namespace: bad-fixed-single
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bad-fixed-single-controller
rules:
- apiGroups: ["benchmark.example.com"]
  resources: ["widgets"]
  verbs: ["get","list","watch","update","patch"]
- apiGroups: ["benchmark.example.com"]
  resources: ["widgets/status"]
  verbs: ["get","update","patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bad-fixed-single-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bad-fixed-single-controller
subjects:
- kind: ServiceAccount
  name: bad-fixed-single-controller
  namespace: bad-fixed-single
