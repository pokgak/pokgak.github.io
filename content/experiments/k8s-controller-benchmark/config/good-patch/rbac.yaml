apiVersion: v1
kind: ServiceAccount
metadata:
  name: good-patch-controller
  namespace: good-patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: good-patch-controller
rules:
- apiGroups: ["benchmark.example.com"]
  resources: ["widgets"]
  verbs: ["get","list","watch","patch"]
- apiGroups: ["benchmark.example.com"]
  resources: ["widgets/status"]
  verbs: ["get","update","patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: good-patch-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: good-patch-controller
subjects:
- kind: ServiceAccount
  name: good-patch-controller
  namespace: good-patch
