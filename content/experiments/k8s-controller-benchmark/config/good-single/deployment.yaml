apiVersion: apps/v1
kind: Deployment
metadata:
  name: good-single-controller
  namespace: good-single
spec:
  replicas: 1
  selector:
    matchLabels:
      app: good-single-controller
  template:
    metadata:
      labels:
        app: good-single-controller
    spec:
      serviceAccountName: good-single-controller
      containers:
      - name: manager
        image: good-single-controller:dev
        imagePullPolicy: Never
        resources:
          limits:
            cpu: "500m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
